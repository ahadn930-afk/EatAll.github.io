<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>

    <!-- ✅ CDN first, then config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>

    <link rel="icon" type="image/x-icon" href="../../../assets/images/android-chrome-192x192.png">
</head>

<!-- ✅ Single body tag with dark classes -->
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300">

    <!-- ✅ Navbar with theme toggle button -->
    <nav class="flex items-center justify-between w-full h-12 bg-red-600 text-white p-2">
        <button class="bg-red-600 p-2 list-none rounded hover:bg-gray-800">
            <a href="../../../index.html"><li>Eat All</li></a>
        </button>
        <div class="flex gap-10 list-none">
            <a href="../../../index.html"><li class="hover:text-black">Home</li></a>
            <a href="../../../src/pages/about/about.html"><li class="hover:text-black">About</li></a>
            <a href="../../../src/pages/contact/contact.html"><li class="hover:text-black">Contact Us</li></a>
        </div>

        <!-- ✅ Theme Toggle Button -->
        <button
            id="theme-toggle"
            class="p-2 rounded-full bg-red-700 hover:bg-red-800 text-white text-lg transition"
            aria-label="Toggle Theme">
            🌙
        </button>

        <div class="flex gap-5 list-none">
            <a href="../../../src/pages/sign in/sign in.html"><li class="hover:text-black">Sign In</li></a>
            <a href="../../../src/pages/sign up/sign up.html"><li class="hover:text-black">Sign Up</li></a>
        </div>
    </nav>

    <div class="flex flex-col items-center justify-center min-h-screen">

        <!-- Heading -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold dark:text-white">Contact Us</h1>
        </div>

        <!-- Form -->
        <form
            action="https://formspree.io/f/xnjglzkb"
            method="POST"
            class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md w-80 flex flex-col gap-4">

            <label class="dark:text-gray-200">
                Your email:
                <input type="email" name="email" placeholder="Enter Your Email" class="w-full border dark:border-gray-600 p-2 rounded dark:bg-gray-700 dark:text-white mt-1" required>
            </label>
            <label class="dark:text-gray-200">
                Your message:
                <textarea name="Message" placeholder="Enter Your Message" rows="4" class="w-full border dark:border-gray-600 p-2 rounded resize-none dark:bg-gray-700 dark:text-white mt-1" required></textarea>
            </label>
            <button type="submit" class="bg-red-600 text-white p-2 rounded hover:bg-black transition">Send</button>
        </form>

        <!-- Footer -->
        <div class="mx-auto w-full max-w-screen-xl p-1 py-4 lg:py-6">
            <footer class="bg-neutral-primary-soft shadow-md border-t border-gray-100 shadow-[2px_2px_5px_2px_rgba(0,0,0,0.1)]">
                <div class="mx-auto w-full max-w-screen-xl p-4 py-6 lg:py-8">
                    <div class="md:flex md:justify-between">
                        <div class="mb-6 md:mb-0">
                            <a href="../../../index.html" class="flex items-center">
                                <img src="https://flowbite.com/docs/images/logo.svg" class="h-7 me-3" alt="FlowBite Logo" />
                                <span class="text-heading self-center text-2xl font-semibold whitespace-nowrap dark:text-white">EatAll</span>
                            </a>
                        </div>
                        <div class="grid grid-cols-2 gap-8 sm:gap-6 sm:grid-cols-3">
                            <div>
                                <a href="../../../src/pages/about/about.html">
                                    <h2 class="mb-6 text-sm font-semibold text-heading uppercase dark:text-white">About Us</h2>
                                </a>
                                <ul class="text-body font-medium">
                                    <li class="mb-4">
                                        <a href="../../../src/pages/contact/contact.html" class="dark:text-gray-300">Contact Us</a>
                                    </li>
                                </ul>
                            </div>
                            <div>
                                <a href="../../../src/pages/sign in/sign in.html">
                                    <h2 class="mb-6 text-sm font-semibold text-heading uppercase dark:text-white">Sign In</h2>
                                </a>
                                <ul class="text-body font-medium">
                                    <li class="mb-4">
                                        <a href="../../../src/pages/sign up/sign up.html" class="dark:text-gray-300">Sign Up</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <hr class="my-6 border-gray-200 dark:border-gray-700 sm:mx-auto lg:my-8" />
                    <div class="sm:flex sm:items-center sm:justify-between">
                        <span class="text-sm text-body dark:text-gray-400 sm:text-center">
                            © 2026 <a href="../../../index.html" class="hover:underline">EatAll™</a>. All Rights Reserved.
                        </span>
                    </div>
                </div>
            </footer>
        </div>

    </div>

    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js"></script>

    <!-- ✅ Theme Script -->
    <script type="module">
        import { getInitialTheme, applyTheme, toggleTheme, updateToggleButton } from '../../../src/utilites/theme.js';

        const saved = getInitialTheme();
        applyTheme(saved);
        updateToggleButton(saved);

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    </script>

</body>
</html>
