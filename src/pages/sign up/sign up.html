<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <!-- ✅ CDN first, then config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>

    <link rel="icon" type="image/x-icon" href="../../../assets/images/android-chrome-192x192.png">
</head>

<!-- ✅ Single body tag with dark classes -->
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300">

    <!-- ✅ Navbar with theme toggle button -->
    <nav class="flex items-center justify-between w-full h-12 bg-red-600 text-white p-2">
        <button class="bg-red-600 p-2 list-none rounded hover:bg-gray-800">
            <a href="../../../index.html"><li>Eat All</li></a>
        </button>
        <div class="flex gap-10 list-none">
            <a href="../../../index.html"><li class="hover:text-black">Home</li></a>
            <a href="../../../src/pages/about/about.html"><li class="hover:text-black">About</li></a>
            <a href="../../../src/pages/contact/contact.html"><li class="hover:text-black">Contact Us</li></a>
        </div>

        <!-- ✅ Theme Toggle Button -->
        <button
            id="theme-toggle"
            class="p-2 rounded-full bg-red-700 hover:bg-red-800 text-white text-lg transition"
            aria-label="Toggle Theme">
            🌙
        </button>

        <div class="flex gap-5 list-none">
            <a href="../../../src/pages/sign in/sign in.html"><li class="hover:text-black">Sign In</li></a>
            <a href="../../../src/pages/sign up/sign up.html"><li class="hover:text-black">Sign Up</li></a>
        </div>
    </nav>

    <h1 class="flex justify-center text-3xl font-bold mt-8 dark:text-white">Sign Up Here!</h1>

    <form class="max-w-md mx-auto mt-8 px-4">

        <!-- Email -->
        <div class="relative z-0 w-full mb-5 group">
            <input type="email" name="floating_email" id="floating_email"
                class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                placeholder=" " required />
            <label for="floating_email"
                class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                Email address
            </label>
        </div>

        <!-- Password -->
        <div class="relative z-0 w-full mb-5 group">
            <input type="password" name="floating_password" id="floating_password"
                class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                placeholder=" " required />
            <label for="floating_password"
                class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                Password
            </label>
        </div>

        <!-- Confirm Password -->
        <div class="relative z-0 w-full mb-5 group">
            <input type="password" name="repeat_password" id="floating_repeat_password"
                class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                placeholder=" " required />
            <label for="floating_repeat_password"
                class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                Confirm password
            </label>
        </div>

        <!-- First & Last Name -->
        <div class="grid md:grid-cols-2 md:gap-6">
            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="floating_first_name" id="floating_first_name"
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                    placeholder=" " required />
                <label for="floating_first_name"
                    class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    First name
                </label>
            </div>
            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="floating_last_name" id="floating_last_name"
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                    placeholder=" " required />
                <label for="floating_last_name"
                    class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Last name
                </label>
            </div>
        </div>

        <!-- Phone & Company -->
        <div class="grid md:grid-cols-2 md:gap-6">
            <div class="relative z-0 w-full mb-5 group">
                <input type="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" name="floating_phone" id="floating_phone"
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                    placeholder=" " required />
                <label for="floating_phone"
                    class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Phone number
                </label>
            </div>
            <div class="relative z-0 w-full mb-5 group">
                <input type="text" name="floating_company" id="floating_company"
                    class="block py-2.5 px-0 w-full text-sm text-gray-900 dark:text-white bg-transparent border-0 border-b-2 border-gray-300 dark:border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-red-600 peer"
                    placeholder=" " required />
                <label for="floating_company"
                    class="absolute text-sm text-gray-500 dark:text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
                    Company (Ex. Google)
                </label>
            </div>
        </div>

        <button type="submit"
            class="w-full text-white bg-red-600 hover:bg-black focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-4 py-2.5 focus:outline-none transition">
            Sign Up
        </button>

        <a href="../sign in/sign in.html" class="flex justify-center mt-4 text-indigo-600 dark:text-indigo-400 text-base font-medium hover:underline">
            Already have an account? Sign In
        </a>
    </form>

    <!-- Footer -->
    <div class="mx-auto w-full max-w-screen-xl p-1 py-4 lg:py-6 mt-10">
        <footer class="shadow-md border-t border-gray-100 dark:border-gray-700">
            <div class="mx-auto w-full max-w-screen-xl p-4 py-6 lg:py-8">
                <div class="md:flex md:justify-between">
                    <div class="mb-6 md:mb-0">
                        <a href="../../../index.html" class="flex items-center">
                            <img src="https://flowbite.com/docs/images/logo.svg" class="h-7 me-3" alt="FlowBite Logo" />
                            <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">EatAll</span>
                        </a>
                    </div>
                    <div class="grid grid-cols-2 gap-8 sm:gap-6 sm:grid-cols-3">
                        <div>
                            <a href="../../../src/pages/about/about.html">
                                <h2 class="mb-6 text-sm font-semibold uppercase dark:text-white">About Us</h2>
                            </a>
                            <ul class="font-medium">
                                <li class="mb-4">
                                    <a href="../../../src/pages/contact/contact.html" class="dark:text-gray-300">Contact Us</a>
                                </li>
                            </ul>
                        </div>
                        <div>
                            <a href="../../../src/pages/sign in/sign in.html">
                                <h2 class="mb-6 text-sm font-semibold uppercase dark:text-white">Sign In</h2>
                            </a>
                            <ul class="font-medium">
                                <li class="mb-4">
                                    <a href="../../../src/pages/sign up/sign up.html" class="dark:text-gray-300">Sign Up</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <hr class="my-6 border-gray-200 dark:border-gray-700 sm:mx-auto lg:my-8" />
                <div class="sm:flex sm:items-center sm:justify-between">
                    <span class="text-sm dark:text-gray-400 sm:text-center">
                        © 2026 <a href="../../../index.html" class="hover:underline">EatAll™</a>. All Rights Reserved.
                    </span>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js"></script>

    <!-- ✅ Theme Script -->
    <script type="module">
        import { getInitialTheme, applyTheme, toggleTheme, updateToggleButton } from '../../../src/utilites/theme.js';

        const saved = getInitialTheme();
        applyTheme(saved);
        updateToggleButton(saved);

        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    </script>

</body>
</html>
